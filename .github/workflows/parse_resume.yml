name: Parse Resume Manually

on:
  workflow_dispatch:

jobs:
  parse_resume_job:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found."
            exit 1
          fi

      - name: Validate env vars
        run: |
          echo "OPENAI_API_KEY starts with: ${OPENAI_API_KEY:0:3}"
          echo "GEMINI_API_KEY starts with: ${GEMINI_API_KEY:0:6}"
          echo "GROQ_API_KEY starts with: ${GROQ_API_KEY:0:4}"
          echo "SUPABASE_URL starts with: ${SUPABASE_URL:0:10}"
          echo "SUPABASE_SERVICE_ROLE_KEY starts with: ${SUPABASE_SERVICE_ROLE_KEY:0:8}"

      - name: Run resume parser script
        run: python resume_parser.py
